name: sculptok_portrait
machine: "60W MOPA fiber"
lightburn_mode: "3D Sliced"
black_is_deep: true

# Portrait preset for sculptok-driven engraving. Sculptok generates the
# heightmap; we don't reshape it — the only knobs here are pre-sculptok
# input prep, deliverable selection (subject mask, photo-tonal, signature),
# and the LightBurn cut-setting starting point.

# Default print BOUNDING BOX — portrait orientation, sized for a
# typical 80 × 120 mm plaque or pendant. The exporter fits the
# heightmap into this area preserving aspect, so a square sculptok
# output would render 80 × 80 mm here (constrained by width) rather
# than being stretched to 80 × 120.
print_width_mm: 80.0
print_height_mm: 120.0

heightmap:
  # Pre-sculptok input conditioning — light cleanup so sculptok gets a
  # clean photo to relief-render. CLAHE + denoise + specular-removal are
  # the three that earn their keep on portraits; everything else is off.
  input_clahe: true
  input_clahe_clip: 1.5
  input_clahe_grid: 8
  input_denoise: true
  input_denoise_strength: 3.0
  input_remove_specular: true
  input_specular_threshold: 250

  # Subject mask — produced as a separate deliverable artifact (mask.png),
  # not applied to the heightmap (sculptok already handled subject/bg).
  subject_mask_enabled: true
  subject_mask_backend: rembg
  subject_mask_feather_px: 2
  subject_mask_threshold: 0.5

  # Sculptok output is the heightmap. Polarity matches LightBurn directly.
  external_heightmap_polarity: bright_raised
  polarity_invert: false

  # No dither by default — let LightBurn 3D Sliced consume the full 16-bit
  # heightmap. Toggle on if collapsing to 8-bit downstream.
  dither: false

lightburn_starting_point:
  lens: "150mm"
  speed_mm_s: 2000
  power_percent: 92
  frequency_khz: 100
  pulse_width_ns: 200
  line_interval_mm: 0.025
  passes: 256
  angle_increment: 45
  cleanup_every_passes: 20
