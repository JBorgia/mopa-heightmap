name: mopa_60w_aluminum
machine: "60W MOPA fiber"
lightburn_mode: "3D Sliced"
black_is_deep: true

heightmap:
  near_percentile: 6
  far_percentile: 94
  gamma: 0.68
  contrast: 1.08
  midtone_boost: 0.1
  deep_limit: 0.05
  surface_limit: 0.95
  smooth: bilateral
  smooth_diameter: 9
  smooth_strength: 0.09
